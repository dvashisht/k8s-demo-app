name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # Prevent infinite loop from self-commit
    if: "!contains(github.event.head_commit.message, 'Update image')"

    runs-on: ubuntu-latest

    env:
      DOCKER_USER: vashishtd
      IMAGE_NAME: demo-app

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # (Optional but helpful for debugging once)
    - name: Show repo structure
      run: ls -R

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t $DOCKER_USER/$IMAGE_NAME:${{ github.sha }} .

    - name: Push Docker image
      run: |
        docker push $DOCKER_USER/$IMAGE_NAME:${{ github.sha }}

    - name: Update deployment.yaml
      run: |
        sed -i "s|image: .*|image: $DOCKER_USER/$IMAGE_NAME:${{ github.sha }}|" deployment.yaml

    - name: Commit updated manifest
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add deployment.yaml
        git commit -m "Update image to ${{ github.sha }}" || echo "No changes to commit"
        git push