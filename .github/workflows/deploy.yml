name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'Update image')"

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Normalize username
    - name: Normalize Docker username
      run: |
        CLEAN=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
        echo "USERNAME=$CLEAN" >> $GITHUB_ENV

    # Login
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build image (FIXED PATH)
    - name: Build Docker image
      run: |
        docker build -t $USERNAME/docker-images/demo-app:${{ github.sha }} .

    # Push image
    - name: Push Docker image
      run: |
        docker push $USERNAME/docker-images/demo-app:${{ github.sha }}

    # Update Kubernetes manifest (FIXED PATH)
    - name: Update deployment.yaml
      run: |
        sed -i "s|image: .*|image: $USERNAME/docker-images/demo-app:${{ github.sha }}|" k8s/deployment.yaml

    # Commit changes
    - name: Commit updated manifest
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add k8s/deployment.yaml
        git commit -m "Update image to ${{ github.sha }}" || echo "No changes to commit"
        git push