name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Debug secrets (safe check)
      run: |
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "USERNAME is empty"; fi
        if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then echo "PASSWORD is empty"; fi

    - name: Log in to Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }} .

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}

    - name: Update deployment.yaml
      run: |
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}|" deployment.yaml

    - name: Commit updated manifest
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add deployment.yaml
        git commit -m "Update image to ${{ github.sha }}"
        git push